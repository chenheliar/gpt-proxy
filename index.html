<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Universal Relay Gateway</title>
    <meta
      name="description"
      content="部署在 Cloudflare Pages + D1 上的个人自用万能中转网关系统，支持可视化管理、账户密码登录与多协议 HTTP 中转。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --paper: oklch(0.978 0.007 95);
        --paper-strong: oklch(0.955 0.01 95);
        --paper-soft: oklch(0.968 0.01 95);
        --ink: oklch(0.255 0.022 255);
        --ink-soft: oklch(0.42 0.015 255);
        --line: oklch(0.84 0.012 90);
        --accent: oklch(0.57 0.05 236);
        --accent-soft: oklch(0.96 0.015 236);
        --shadow: 0 16px 40px color-mix(in oklab, var(--ink) 8%, transparent);
        --space-1: 8px;
        --space-2: 12px;
        --space-3: 16px;
        --space-4: 20px;
        --space-5: 28px;
        --space-6: 40px;
        --space-7: 56px;
        --space-8: 72px;
        --font-sans: "Source Sans 3", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        --text-xs: 0.8125rem;
        --text-sm: 0.9375rem;
        --text-body: 1rem;
        --text-lead: 1.125rem;
        --text-title: 1.375rem;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-width: 320px;
        font-family: var(--font-sans);
        font-size: var(--text-body);
        line-height: 1.68;
        font-kerning: normal;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, color-mix(in oklab, var(--accent) 10%, transparent), transparent 30%),
          linear-gradient(180deg, var(--paper), var(--paper-strong));
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }

      a,
      strong,
      p,
      h1,
      h2,
      code,
      .lede,
      .detail-list,
      .stack {
        min-width: 0;
      }

      .shell {
        width: min(1160px, calc(100vw - 24px));
        margin: 0 auto;
        padding: clamp(20px, 4vw, 36px) 0 clamp(48px, 8vw, 88px);
        display: grid;
        gap: clamp(28px, 5vw, 56px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        max-width: 100%;
        min-height: 34px;
        padding: 6px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: var(--text-xs);
        line-height: 1.25;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
        background: color-mix(in oklab, white 50%, transparent);
        overflow-wrap: anywhere;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.82fr);
        gap: clamp(24px, 4vw, 44px);
        align-items: start;
        padding-block: clamp(28px, 5vw, 52px) clamp(12px, 2vw, 24px);
      }

      .stack {
        display: grid;
        gap: var(--space-4);
      }

      .hero-copy {
        gap: clamp(14px, 2.5vw, 22px);
        max-width: 62ch;
      }

      .hero-panel {
        display: grid;
        gap: clamp(16px, 2.6vw, 22px);
        align-content: start;
      }

      .hero-panel-copy {
        display: grid;
        gap: 8px;
      }

      .hero-points {
        display: grid;
        gap: 12px;
      }

      .hero-point {
        display: grid;
        gap: 6px;
        padding: 16px 18px;
        border-radius: 20px;
        border: 1px solid color-mix(in oklab, var(--line) 80%, var(--accent));
        background: color-mix(in oklab, var(--accent-soft) 36%, white);
      }

      .hero-point span {
        font-size: var(--text-xs);
        line-height: 1.3;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .hero-point strong {
        color: var(--ink);
        font-size: var(--text-body);
        line-height: 1.55;
        font-weight: 600;
      }

      h1,
      h2 {
        margin: 0;
        font-family: var(--font-sans);
        font-weight: 600;
        letter-spacing: -0.03em;
        color: var(--ink);
        text-wrap: balance;
      }

      h1 {
        font-size: clamp(2.6rem, 7vw, 5.2rem);
        line-height: 1.02;
        max-width: 9ch;
      }

      h2 {
        font-size: clamp(1.55rem, 2.8vw, 2.25rem);
        line-height: 1.12;
      }

      p {
        margin: 0;
      }

      .lede,
      .muted,
      .detail-list {
        color: var(--ink-soft);
        line-height: 1.72;
        text-wrap: pretty;
        overflow-wrap: anywhere;
      }

      .lede {
        max-width: 60ch;
        font-size: var(--text-lead);
        line-height: 1.74;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        align-items: center;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 12px 20px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: color-mix(in oklab, white 66%, transparent);
        color: var(--ink);
        text-decoration: none;
        text-align: center;
        font-size: var(--text-sm);
        font-weight: 600;
        line-height: 1.35;
        overflow-wrap: anywhere;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        border-color: color-mix(in oklab, var(--accent) 42%, var(--line));
      }

      .button.primary {
        background: var(--ink);
        color: var(--paper);
        border-color: transparent;
      }

      .surface {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: color-mix(in oklab, white 72%, transparent);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: clamp(22px, 3vw, 30px);
      }

      @media (max-width: 960px) {
        .hero {
          grid-template-columns: 1fr;
        }

        h1 {
          max-width: 10ch;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(calc(100vw - 40px), 1160px);
          padding-top: 12px;
          padding-bottom: 40px;
        }

        .hero {
          gap: 24px;
        }

        .panel,
        .card {
          padding: 20px 18px;
          border-radius: 24px;
        }

        .button {
          width: 100%;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="stack hero-copy">
          <span class="eyebrow">Personal Relay Gateway</span>
          <h1>个人中转网关</h1>
          <p class="lede">
            用于统一中转请求，并简化日常管理。
          </p>
          <div class="actions">
            <a class="button primary" href="/admin/">进入管理后台</a>
            <a class="button" href="https://github.com/chenheliar" target="_blank" rel="noreferrer">GitHub</a>
          </div>
        </div>

        <aside class="surface panel hero-panel" aria-label="页面概览">
          <div class="hero-panel-copy">
            <span class="eyebrow">Overview</span>
            <p class="muted">
              <!-- 只保留必要说明，把更多操作留给后台。 -->
            </p>
          </div>
          <div class="hero-points">
            <div class="hero-point">
              <span>统一入口</span>
              <strong>将常见请求收拢到同一处处理。</strong>
            </div>
            <div class="hero-point">
              <span>规则管理</span>
              <strong>通过后台维护路由与规则。</strong>
            </div>
            <div class="hero-point">
              <span>日常维护</span>
              <strong>保持界面简洁，方便随时进入处理。</strong>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
